<svg viewBox="0 0 560 470" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>Anatomy of a vertical box plot</title>
  <desc>A vertical box plot labeling the median, the Q1 and Q3 quartiles, the
        interquartile range (IQR = Q3 minus Q1), the lower and upper fences at
        1.5 times the IQR beyond the box, and the outlier dots that fall past
        the fences.</desc>
  <style>
    .title{font-size:16px;font-weight:700;fill:#1f2328}
    .lbl{font-size:13px;fill:#1f2328}
    .bold{font-weight:700}
    .lead{stroke:#c4c8cd;stroke-width:1;stroke-dasharray:3 3;fill:none}
    .whisk{stroke:#57606a;stroke-width:1.6}
    .iqrtext{font-size:12px;font-weight:600;fill:#1f6feb}
    .dimtext{font-size:12px;fill:#6e7781}
    @media (prefers-color-scheme: dark){
      .title{fill:#e6edf3}.lbl{fill:#e6edf3}.whisk{stroke:#9aa6b2}
      .lead{stroke:#3d444d}.dimtext{fill:#8b949e}
    }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto-start-reverse">
      <path d="M1.5,1.5 L6.5,4.5 L1.5,7.5" fill="none" stroke="#1f6feb" stroke-width="1.4"/>
    </marker>
  </defs>

  <text class="title" x="20" y="30">Anatomy of a Box Plot (Tukey / IQR)</text>

  <!-- whiskers -->
  <line class="whisk" x1="175" y1="92"  x2="175" y2="170"/>
  <line class="whisk" x1="175" y1="300" x2="175" y2="378"/>
  <!-- whisker caps -->
  <line class="whisk" x1="148" y1="92"  x2="202" y2="92"/>
  <line class="whisk" x1="148" y1="378" x2="202" y2="378"/>
  <!-- box (Q1 to Q3) -->
  <rect x="135" y="170" width="80" height="130" rx="3"
        fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="2"/>
  <!-- median -->
  <line x1="135" y1="232" x2="215" y2="232" stroke="#cf222e" stroke-width="2.6"/>

  <!-- outlier dots -->
  <circle cx="170" cy="58"  r="5" fill="#fb8500" stroke="#9a3412" stroke-width="1"/>
  <circle cx="183" cy="70"  r="5" fill="#fb8500" stroke="#9a3412" stroke-width="1"/>
  <circle cx="175" cy="418" r="5" fill="#fb8500" stroke="#9a3412" stroke-width="1"/>

  <!-- left: IQR and 1.5*IQR span indicators -->
  <line x1="112" y1="170" x2="112" y2="300" stroke="#1f6feb" stroke-width="1.4"
        marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text class="iqrtext" transform="rotate(-90 99 235)" x="99" y="235" text-anchor="middle">IQR = Q3 − Q1</text>

  <line x1="112" y1="92" x2="112" y2="170" stroke="#1f6feb" stroke-width="1.4" opacity="0.65"
        marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text class="dimtext" transform="rotate(-90 99 131)" x="99" y="131" text-anchor="middle">1.5 × IQR</text>

  <line x1="112" y1="300" x2="112" y2="378" stroke="#1f6feb" stroke-width="1.4" opacity="0.65"
        marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text class="dimtext" transform="rotate(-90 99 339)" x="99" y="339" text-anchor="middle">1.5 × IQR</text>

  <!-- right: leader lines + labels -->
  <line class="lead" x1="188" y1="64"  x2="250" y2="64"/>
  <text class="lbl" x="258" y="68"><tspan class="bold">Outliers</tspan> — points past the fences</text>

  <line class="lead" x1="202" y1="92"  x2="250" y2="92"/>
  <text class="lbl" x="258" y="96"><tspan class="bold">Upper fence</tspan> = Q3 + 1.5 × IQR</text>

  <line class="lead" x1="215" y1="170" x2="250" y2="170"/>
  <text class="lbl" x="258" y="174"><tspan class="bold">Q3</tspan> — 75th percentile</text>

  <line class="lead" x1="215" y1="232" x2="250" y2="232"/>
  <text class="lbl" x="258" y="236"><tspan class="bold">Median (Q2)</tspan> — 50th percentile</text>

  <line class="lead" x1="215" y1="300" x2="250" y2="300"/>
  <text class="lbl" x="258" y="304"><tspan class="bold">Q1</tspan> — 25th percentile</text>

  <line class="lead" x1="202" y1="378" x2="250" y2="378"/>
  <text class="lbl" x="258" y="382"><tspan class="bold">Lower fence</tspan> = Q1 − 1.5 × IQR</text>

  <line class="lead" x1="181" y1="418" x2="250" y2="418"/>
  <text class="lbl" x="258" y="422"><tspan class="bold">Outlier</tspan> — a single low flier</text>
</svg>
